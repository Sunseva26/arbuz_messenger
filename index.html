<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арбуз - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Экран регистрации */
        .auth-screen {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .auth-header h1 {
            font-size: 42px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .auth-header .watermelon-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .auth-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .auth-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        /* Основной интерфейс */
        .messenger-container {
            width: 1200px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .sidebar-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header .user-info {
            font-size: 14px;
            opacity: 0.9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .search-container {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-result-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .search-result-item:hover {
            background: #f0f9f4;
        }

        .search-result-item .username {
            font-weight: 600;
            color: #333;
        }

        .search-result-item .fullname {
            font-size: 13px;
            color: #666;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-item:hover {
            background: #e8f5e9;
        }

        .chat-item.active {
            background: linear-gradient(90deg, #11998e15, #38ef7d15);
            border-left: 4px solid #11998e;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .chat-last-message {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-chats {
            padding: 30px;
            text-align: center;
            color: #999;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-header .name {
            font-size: 18px;
            font-weight: 600;
        }

        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #f9fbf9;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 60%;
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .message .sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
            opacity: 0.8;
        }

        .message .text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
        }

        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.3);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        .empty-state .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Экран регистрации -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-header">
            <div class="watermelon-icon">🍉</div>
            <h1>Арбуз</h1>
            <p>Мессенджер для общения</p>
        </div>
        <div class="auth-form">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="firstName" placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" id="lastName" placeholder="Введите фамилию">
            </div>
            <div class="form-group">
                <label>Имя пользователя (@username)</label>
                <input type="text" id="username" placeholder="@username">
                <div class="error-message" id="usernameError">Это имя пользователя уже занято</div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Придумайте пароль">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль">
            </div>
            <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
            <p style="text-align: center; margin-top: 15px; color: #666;">
                Уже есть аккаунт? 
                <a href="#" onclick="showLogin()" style="color: #11998e; text-decoration: none; font-weight: 600;">Войти</a>
            </p>
        </div>
    </div>

    <!-- Экран входа -->
    <div id="loginScreen" class="auth-screen hidden">
        <div class="auth-header">
            <div class="watermelon-icon">🍉</div>
            <h1>Арбуз</h1>
            <p>Вход в аккаунт</p>
        </div>
        <div class="auth-form">
            <div class="form-group">
                <label>Имя пользователя (@username)</label>
                <input type="text" id="loginUsername" placeholder="@username">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button class="auth-btn" onclick="login()">Войти</button>
            <p style="text-align: center; margin-top: 15px; color: #666;">
                Нет аккаунта? 
                <a href="#" onclick="showRegister()" style="color: #11998e; text-decoration: none; font-weight: 600;">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <!-- Основной интерфейс мессенджера -->
    <div id="messengerScreen" class="messenger-container hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🍉 Арбуз</h2>
                <div class="user-info">
                    <span id="currentUserDisplay"></span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по @username или имени" oninput="searchUsers()">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="no-chats">
                    <p>Найдите пользователя, чтобы начать чат</p>
                </div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header hidden" id="chatHeader">
                <div class="avatar" id="chatAvatar"></div>
                <div class="name" id="chatName"></div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="icon">🍉</div>
                    <p>Выберите чат, чтобы начать общение</p>
                </div>
            </div>
            <div class="message-input-container hidden" id="messageInputContainer">
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
        import { getDatabase, ref, set, push, onValue, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2xAbOiLQ07xFQkemz1yLjCtytzbmQzeU",
            authDomain: "pinboard-5e464.firebaseapp.com",
            projectId: "pinboard-5e464",
            storageBucket: "pinboard-5e464.firebasestorage.app",
            messagingSenderId: "563602804000",
            appId: "1:563602804000:web:c045381993e5da30c35b45",
            measurementId: "G-YYZXLSC5D8"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);

        let currentUser = null;
        let currentChat = null;
        let chats = {};

        // Делаем функции доступными глобально
        window.register = register;
        window.login = login;
        window.logout = logout;
        window.showRegister = showRegister;
        window.showLogin = showLogin;
        window.searchUsers = searchUsers;
        window.sendMessage = sendMessage;
        window.handleKeyPress = handleKeyPress;
        window.startChat = startChat;
        window.selectChat = selectChat;

        // Проверяем, есть ли сохраненная сессия
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showMessenger();
            loadChats();
        }

        function showLogin() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function showRegister() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }

        async function register() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!firstName || !lastName || !username || !password || !confirmPassword) {
                alert('Заполните все поля');
                return;
            }

            if (password !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }

            if (!username.startsWith('@')) {
                alert('Имя пользователя должно начинаться с @');
                return;
            }

            // Проверяем, существует ли пользователь
            const usersRef = ref(database, 'users');
            const userQuery = query(usersRef, orderByChild('username'), equalTo(username));
            const snapshot = await get(userQuery);

            if (snapshot.exists()) {
                document.getElementById('usernameError').style.display = 'block';
                return;
            }

            // Создаем пользователя
            const userData = {
                firstName,
                lastName,
                username,
                password,
                createdAt: Date.now()
            };

            const newUserRef = push(usersRef);
            await set(newUserRef, userData);

            currentUser = {
                id: newUserRef.key,
                ...userData
            };
            delete currentUser.password;

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showMessenger();
            loadChats();
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }

            const usersRef = ref(database, 'users');
            const userQuery = query(usersRef, orderByChild('username'), equalTo(username));
            const snapshot = await get(userQuery);

            if (!snapshot.exists()) {
                alert('Пользователь не найден');
                return;
            }

            let userData;
            snapshot.forEach((child) => {
                userData = { id: child.key, ...child.val() };
            });

            if (userData.password !== password) {
                alert('Неверный пароль');
                return;
            }

            currentUser = {
                id: userData.id,
                firstName: userData.firstName,
                lastName: userData.lastName,
                username: userData.username
            };

            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showMessenger();
            loadChats();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            currentChat = null;
            document.getElementById('messengerScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
        }

        function showMessenger() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('messengerScreen').classList.remove('hidden');
            document.getElementById('currentUserDisplay').textContent = 
                `${currentUser.firstName} ${currentUser.lastName} (${currentUser.username})`;
        }

        async function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const searchResults = document.getElementById('searchResults');

            if (searchTerm.length < 1) {
                searchResults.innerHTML = '';
                return;
            }

            const usersRef = ref(database, 'users');
            const snapshot = await get(usersRef);

            searchResults.innerHTML = '';
            
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const user = child.val();
                    const userId = child.key;

                    if (userId === currentUser.id) return;

                    const fullName = `${user.firstName} ${user.lastName}`.toLowerCase();
                    const username = user.username.toLowerCase();

                    if (fullName.includes(searchTerm) || username.includes(searchTerm)) {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `
                            <div class="username">${user.username}</div>
                            <div class="fullname">${user.firstName} ${user.lastName}</div>
                        `;
                        div.onclick = () => startChat(userId, user);
                        searchResults.appendChild(div);
                    }
                });
            }
        }

        function startChat(userId, user) {
            const chatId = [currentUser.id, userId].sort().join('_');
            
            if (!chats[chatId]) {
                const chatData = {
                    participants: [currentUser.id, userId],
                    createdAt: Date.now()
                };
                set(ref(database, `chats/${chatId}`), chatData);
            }

            currentChat = {
                id: chatId,
                user: {
                    id: userId,
                    firstName: user.firstName,
                    lastName: user.lastName,
                    username: user.username
                }
            };

            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchInput').value = '';
            loadChats();
            openChat();
        }

        function selectChat(chatId) {
            const chat = chats[chatId];
            const otherUserId = chat.participants.find(id => id !== currentUser.id);
            
            get(ref(database, `users/${otherUserId}`)).then((snapshot) => {
                const user = snapshot.val();
                currentChat = {
                    id: chatId,
                    user: {
                        id: otherUserId,
                        ...user
                    }
                };
                openChat();
            });
        }

        function openChat() {
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('messageInputContainer').classList.remove('hidden');
            document.querySelector('.empty-state')?.remove();

            document.getElementById('chatName').textContent = 
                `${currentChat.user.firstName} ${currentChat.user.lastName}`;
            document.getElementById('chatAvatar').textContent = 
                currentChat.user.firstName.charAt(0);

            // Обновляем активный чат в списке
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.chatId === currentChat.id) {
                    item.classList.add('active');
                }
            });

            loadMessages();
        }

        function loadChats() {
            const chatsRef = ref(database, 'chats');
            onValue(chatsRef, (snapshot) => {
                const chatsList = document.getElementById('chatsList');
                
                if (!snapshot.exists()) {
                    chatsList.innerHTML = '<div class="no-chats"><p>Найдите пользователя, чтобы начать чат</p></div>';
                    return;
                }

                chats = {};
                chatsList.innerHTML = '';

                snapshot.forEach((child) => {
                    const chatData = child.val();
                    const chatId = child.key;

                    if (chatData.participants.includes(currentUser.id)) {
                        chats[chatId] = chatData;

                        const otherUserId = chatData.participants.find(id => id !== currentUser.id);
                        
                        get(ref(database, `users/${otherUserId}`)).then((userSnapshot) => {
                            const user = userSnapshot.val();
                            
                            const div = document.createElement('div');
                            div.className = 'chat-item';
                            div.dataset.chatId = chatId;
                            div.innerHTML = `
                                <div class="chat-avatar">${user.firstName.charAt(0)}</div>
                                <div class="chat-info">
                                    <div class="chat-name">${user.firstName} ${user.lastName}</div>
                                    <div class="chat-last-message">${user.username}</div>
                                </div>
                            `;
                            div.onclick = () => selectChat(chatId);
                            chatsList.appendChild(div);
                        });
                    }
                });
            });
        }

        function loadMessages() {
            const messagesContainer = document.getElementById('messagesContainer');
            const messagesRef = ref(database, `messages/${currentChat.id}`);

            onValue(messagesRef, (snapshot) => {
                messagesContainer.innerHTML = '';

                if (snapshot.exists()) {
                    snapshot.forEach((child) => {
                        const message = child.val();
                        displayMessage(message);
                    });
                }

                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        function displayMessage(message) {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            const isSent = message.senderId === currentUser.id;
            
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `
                ${!isSent ? `<div class="sender">${message.senderName}</div>` : ''}
                <div class="text">${message.text}</div>
                <div class="time">${new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;

            messagesContainer.appendChild(messageDiv);
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();

            if (!text || !currentChat) return;

            const messageData = {
                text,
                senderId: currentUser.id,
                senderName: `${currentUser.firstName} ${currentUser.lastName}`,
                timestamp: Date.now()
            };

            const messagesRef = ref(database, `messages/${currentChat.id}`);
            await push(messagesRef, messageData);

            messageInput.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Закрываем результаты поиска при клике вне
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                document.getElementById('searchResults').innerHTML = '';
            }
        });
    </script>
</body>
</html>
